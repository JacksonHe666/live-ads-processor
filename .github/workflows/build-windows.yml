name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "web_app.py"
      - "process_live_ads.py"
      - "requirements.txt"
      - "live_ads_processor.spec"
      - "package.json"
      - "electron/**"
      - "static/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    name: Build 直播投放处理器 desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend EXE
        run: pyinstaller --noconfirm --clean live_ads_processor.spec

      - name: Smoke test backend exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist/直播投放处理器后端/直播投放处理器后端.exe")) {
            throw "dist/直播投放处理器后端/直播投放处理器后端.exe was not created"
          }

      - name: Install Electron dependencies
        run: npm install

      - name: Build Electron desktop app
        run: npm run build:win -- --publish never

      - name: Smoke test desktop app exists
        shell: pwsh
        run: |
          $files = Get-ChildItem "electron-dist" -Filter "*.exe"
          if ($files.Count -lt 1) {
            throw "Electron desktop exe was not created"
          }
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "electron-dist/*.exe" "release/"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: 直播投放处理器-windows-desktop
          path: |
            release/*.exe
          if-no-files-found: error

      - name: Upload EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 直播投放处理器 ${{ github.ref_name }}
          files: release/*.exe
          body: |
            直播投放处理器桌面版 ${{ github.ref_name }}

            - Windows：下载 exe 后双击运行。
            - macOS：请下载同一 Release 中的 mac-arm64 dmg 文件。
            - 桌面版后端已改为目录式打包，减少启动等待。
