name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "web_app.py"
      - "process_live_ads.py"
      - "requirements.txt"
      - "live_ads_processor.spec"
      - "static/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    name: Build 直播投放处理器.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm --clean live_ads_processor.spec

      - name: Smoke test artifact exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist/直播投放处理器.exe")) {
            throw "dist/直播投放处理器.exe was not created"
          }

      - name: Package EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "dist/直播投放处理器.exe" "release/直播投放处理器.exe"
          Compress-Archive -Path "release/直播投放处理器.exe" -DestinationPath "直播投放处理器-windows.zip" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: 直播投放处理器-windows
          path: |
            release/直播投放处理器.exe
            直播投放处理器-windows.zip
          if-no-files-found: error
