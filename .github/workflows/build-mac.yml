name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "web_app.py"
      - "process_live_ads.py"
      - "requirements.txt"
      - "live_ads_processor.spec"
      - "package.json"
      - "electron/**"
      - "static/**"
      - ".github/workflows/build-mac.yml"

jobs:
  build-mac:
    name: Build 直播投放处理器 DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        run: pyinstaller --noconfirm --clean live_ads_processor.spec

      - name: Smoke test backend exists
        run: |
          test -f "dist/直播投放处理器后端"

      - name: Install Electron dependencies
        run: npm install

      - name: Build macOS DMG
        run: npm run build:mac

      - name: Smoke test DMG exists
        run: |
          mkdir -p release
          cp electron-dist/*.dmg release/
          ls -lh release

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: 直播投放处理器-mac-dmg
          path: release/*.dmg
          if-no-files-found: error
